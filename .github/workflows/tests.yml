name: tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --passWithNoTests --ci
